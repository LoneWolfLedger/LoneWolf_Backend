name: Autonomous Oracle Swarm Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Heavy AI Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance torch numpy pandas scipy scikit-learn vaderSentiment feedparser requests

      - name: Ignite The Singularity (Push data to Render)
        run: |
          cd oracle_engine
          python master_matrix.py
