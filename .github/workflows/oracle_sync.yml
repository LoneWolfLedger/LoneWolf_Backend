name: Autonomous Oracle Swarm Sync

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours automatically
  workflow_dispatch: # Allows you to click a button to run it instantly

jobs:
  execute_matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get install -y build-essential

      - name: Install Python AI & Math Libraries
        run: pip install -r requirements.txt

      - name: Execute KAN & LPPLS Brain
        env:
          MASTER_KEY: ${{ secrets.MASTER_KEY }} # Pulls from your GitHub Secrets
        run: python main.py # (Change main.py to whatever you named your Python file)