name: Autonomous Oracle Swarm Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly at the top of every hour (24/7)
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  run-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install AI Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ignite The Singularity (Push data to Render)
        run: |
          cd oracle_engine
          python master_matrix.py
